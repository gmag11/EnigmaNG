; PlatformIO Project Configuration File
; EnigmaNG - Secure ESP-NOW Mesh with IP Transparency

[platformio]
src_dir = ./examples/arduino/
lib_dir = .

; ---------------------------------------------------------------------------
; Common settings for all envs
; ---------------------------------------------------------------------------
[env]
upload_speed = 512000
monitor_speed = 115200
; monitor_rts = 0
; monitor_dtr = 0
; Prevent example sketch directories from being treated as libraries.
; lib_dir=. causes PlatformIO to scan all subdirs of the project root, which
; includes examples/arduino/* as candidate libraries.
lib_ignore = examples
; , BasicNode, BatteryNode, GatewayPing, GatewaySingleChip, MeshNode8266, NodePing

; ---------------------------------------------------------------------------
; Common settings per chip family
; ---------------------------------------------------------------------------
[esp32_common]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
framework = arduino
; Arduino Core ESP32 3.3.8 (IDF 5.5.4)
lib_deps =
    https://github.com/gmag11/QuickESPNow.git
build_flags =
    -DMESH_MAX_PEERS=16
    -DMESH_MAX_ROUTES=64
    -DMESH_SEEN_CACHE_SIZE=32
    -DBOARD_ESP32_DEV

[esp32s3_common]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
framework = arduino
; Arduino Core ESP32 3.3.8 (IDF 5.5.4)
lib_deps =
    https://github.com/gmag11/QuickESPNow.git
build_flags =
    -DMESH_MAX_PEERS=16
    -DMESH_MAX_ROUTES=64
    -DMESH_SEEN_CACHE_SIZE=32
    -DBOARD_ESP32_S3

; ---------------------------------------------------------------------------
; BasicNode example
; ---------------------------------------------------------------------------
[env:esp32dev-BasicNode]
extends = esp32_common
board = esp32dev
build_src_filter = -<*> +<BasicNode/>

[env:esp32s3-BasicNode]
extends = esp32s3_common
board = esp32-s3-devkitc-1
build_src_filter = -<*> +<BasicNode/>

; ---------------------------------------------------------------------------
; BatteryNode example
; ---------------------------------------------------------------------------
[env:esp32dev-BatteryNode]
extends = esp32_common
board = esp32dev
build_src_filter = -<*> +<BatteryNode/>

[env:esp32s3-BatteryNode]
extends = esp32s3_common
board = esp32-s3-devkitc-1
build_src_filter = -<*> +<BatteryNode/>

; ---------------------------------------------------------------------------
; GatewaySingleChip example
; ---------------------------------------------------------------------------
[env:esp32dev-GatewaySingleChip]
extends = esp32_common
board = esp32dev
build_src_filter = -<*> +<GatewaySingleChip/>

[env:esp32s3-GatewaySingleChip]
extends = esp32s3_common
board = esp32-s3-devkitc-1
build_src_filter = -<*> +<GatewaySingleChip/>

; ---------------------------------------------------------------------------
; GatewayPing example (periodic ICMP ping to all mesh nodes)
; ---------------------------------------------------------------------------
[env:esp32dev-GatewayPing]
extends = esp32_common
board = esp32dev
build_src_filter = -<*> +<GatewayPing/>

[env:esp32s3-GatewayPing]
extends = esp32s3_common
board = esp32-s3-devkitc-1
build_src_filter = -<*> +<GatewayPing/>

; ---------------------------------------------------------------------------
; NodePing example (mesh node that pings a fixed LAN host)
; ---------------------------------------------------------------------------
[env:esp32dev-NodePing]
extends = esp32_common
board = esp32dev
build_src_filter = -<*> +<NodePing/>

[env:esp32s3-NodePing]
extends = esp32s3_common
board = esp32-s3-devkitc-1
build_src_filter = -<*> +<NodePing/>

; ---------------------------------------------------------------------------
; MqttNode example (mesh node that publishes MQTT messages to a LAN broker)
; ---------------------------------------------------------------------------
[env:esp32dev-MqttNode]
extends = esp32_common
board = esp32dev
build_src_filter = -<*> +<MqttNode/>
lib_deps =
    https://github.com/gmag11/QuickESPNow.git
    knolleary/PubSubClient

[env:esp32s3-MqttNode]
extends = esp32s3_common
board = esp32-s3-devkitc-1
build_src_filter = -<*> +<MqttNode/>
lib_deps =
    https://github.com/gmag11/QuickESPNow.git
    knolleary/PubSubClient

; ---------------------------------------------------------------------------
; IperfNode example (mesh node that runs an iperf2-compatible TCP client)
; ---------------------------------------------------------------------------
[env:esp32dev-IperfNode]
extends = esp32_common
board = esp32dev
build_src_filter = -<*> +<IperfNode/>

[env:esp32s3-IperfNode]
extends = esp32s3_common
board = esp32-s3-devkitc-1
build_src_filter = -<*> +<IperfNode/>

; ---------------------------------------------------------------------------
; MeshNode8266 example (ESP8266 proxy MQTT node)
; ---------------------------------------------------------------------------
[env:esp8266-MeshNode8266]
platform = espressif8266
framework = arduino
board = nodemcuv2
lib_deps =
    https://github.com/gmag11/QuickESPNow.git
build_flags =
    -DMESH_MAX_PEERS=16
    -DMESH_MAX_ROUTES=64
    -DMESH_SEEN_CACHE_SIZE=32
build_src_filter = -<*> +<MeshNode8266/>

; ---------------------------------------------------------------------------
; Unit tests (native – runs on PC, no hardware required)
; ---------------------------------------------------------------------------
[env:test]
platform = native
test_framework = unity
lib_ignore = src
lib_extra_dirs = ${PROJECT_DIR}/test
lib_deps =
    kochcodes/mbedtls
build_flags =
    -DMESH_MAX_PEERS=16
    -DMESH_MAX_ROUTES=64
    -DMESH_SEEN_CACHE_SIZE=32
    -DUNITY_INCLUDE_DOUBLE
    -Itest/mocks
    -Isrc
    -lbcrypt
