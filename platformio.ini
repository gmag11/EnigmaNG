; PlatformIO Project Configuration File
; EnigmaNG - Secure ESP-NOW Mesh with IP Transparency

[env]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
framework = arduino
; Arduino Core ESP32 3.3.8 (IDF 5.5.4)

lib_deps =
    https://github.com/gmag11/QuickESPNow.git

monitor_speed = 115200
build_flags =
    -DMESH_MAX_PEERS=16
    -DMESH_MAX_ROUTES=64
    -DMESH_SEEN_CACHE_SIZE=32

[env:esp32dev]
board = esp32dev
src_dir = examples/arduino/BasicNode
build_flags =
    ${env.build_flags}
    -DBOARD_ESP32_DEV

[env:esp32s3]
board = esp32-s3-devkitc-1
src_dir = examples/arduino/BasicNode
build_flags =
    ${env.build_flags}
    -DBOARD_ESP32_S3

[env:test]
board = esp32dev
build_flags =
    ${env.build_flags}
    -DUNITY_INCLUDE_DOUBLE
test_framework = unity
